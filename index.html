<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>مدير الديون</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family: Arial;
background:#f2f4f8;
margin:0;
direction:rtl;
}

header{
background:#0f172a;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
}

button{

padding:12px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;

}

.add{
background:#22c55e;
color:white;
}

.voice{
background:#3b82f6;
color:white;
}

.camera{
background:#f59e0b;
color:white;
}

.card{

background:white;
padding:12px;
margin:10px 0;
border-radius:12px;

}

.total{
font-size:18px;
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<header>
مدير الديون الشخصي
</header>

<div class="container">

<button class="add" onclick="addDebt()">➕ إضافة دين</button>

<button class="voice" onclick="startVoice()">🎤 تسجيل صوتي</button>

<input type="file" accept="image/*" capture="camera">

<div id="list"></div>

<div class="total" id="total"></div>

</div>

<script>

let debts = JSON.parse(localStorage.getItem("debts")) || []

function save(){

localStorage.setItem("debts",JSON.stringify(debts))

}

function addDebt(){

let person = prompt("اسم الشخص او الدكان")

let item = prompt("اسم الشيء")

let price = prompt("السعر بالدينار")

let obj = {

person,
item,
price:parseInt(price),
date:new Date().toLocaleDateString()

}

debts.push(obj)

save()

render()

notify("تم تسجيل دين",person+" "+price+" دينار")

}

function render(){

let list=document.getElementById("list")

list.innerHTML=""

let total=0

debts.forEach(d=>{

total+=d.price

list.innerHTML+=`

<div class="card">

<b>${d.person}</b><br>

${d.item} - ${d.price} دينار<br>

${d.date}

</div>

`

})

document.getElementById("total").innerText=

"إجمالي الديون: "+total+" دينار"

}

render()

function notify(title,msg){

if(Notification.permission==="granted"){

new Notification(title,{body:msg})

}

}

if("Notification" in window){

Notification.requestPermission()

}

const SpeechRecognition=

window.SpeechRecognition||

window.webkitSpeechRecognition

const recognition=new SpeechRecognition()

recognition.lang="ar-SA"

function startVoice(){

recognition.start()

}

recognition.onresult=function(e){

let text=e.results[0][0].transcript

alert("سمعت: "+text)

}

</script>

</body>
</html>
