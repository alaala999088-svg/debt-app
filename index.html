<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدير الديون الاحترافي</title>
<link rel="manifest" href="manifest.json">
<style>
/* ===== التصميم العام ===== */
body{
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin:0;
  background:#f2f4f8;
  direction: rtl;
}
header{
  background: linear-gradient(90deg, #4f46e5, #6366f1);
  color:white;
  text-align:center;
  padding:15px 0;
  font-size:22px;
  font-weight:bold;
  box-shadow:0px 2px 5px rgba(0,0,0,0.2);
}
.container{
  padding:10px 15px;
}

/* ===== أزرار رئيسية ===== */
button{
  padding:12px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);}
.add{background:#22c55e;color:white;}
.voice{background:#3b82f6;color:white;}
.camera{background:#f59e0b;color:white;}
.share{background:#10b981;color:white;}

/* ===== الجداول ===== */
table{
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  box-shadow:0px 2px 6px rgba(0,0,0,0.1);
  border-radius:10px;
  overflow:hidden;
}
th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}
th{
  background: linear-gradient(90deg, #4f46e5, #a5b4fc);
  color:white;
}
tr:nth-child(even){background:#e5e7eb;}
tr:hover{background:#c7d2fe;}
.total{
  font-size:18px;
  color:#dc2626;
  margin-top:5px;
  font-weight:bold;
}
img.invoice-img{
  width:40px;
  cursor:pointer;
  border-radius:5px;
  transition:0.3s;
}
img.invoice-img:hover{
  transform: scale(2);
}

/* ===== بطاقات الأشخاص ===== */
.card{
  background:white;
  border-radius:10px;
  padding:10px;
  margin:5px 0;
  box-shadow:0px 2px 5px rgba(0,0,0,0.15);
}
.card h4{
  margin:0 0 5px 0;
}
.card p{
  margin:2px 0;
}
</style>
</head>

<body>
<header>مدير الديون الاحترافي</header>

<div class="container">
<button class="add" onclick="addDebt()">➕ إضافة دين</button>
<button class="voice" onclick="startVoice()">🎤 تسجيل صوتي</button>
<input type="file" accept="image/*" capture="camera" id="invoiceImage">
<div id="tables"></div>
<div class="total" id="total"></div>
</div>

<script>
// ===== بيانات الديون =====
let debts = JSON.parse(localStorage.getItem("debts")) || []

function save(){ localStorage.setItem("debts",JSON.stringify(debts)) }

// ===== إضافة دين =====
function addDebt(){
  let person = prompt("اسم الشخص أو الدكان")
  let item = prompt("اسم المنتج")
  let price = prompt("السعر بالدينار")
  let imgFile = document.getElementById("invoiceImage").files[0]
  let image = imgFile ? URL.createObjectURL(imgFile) : null

  let obj = { person, item, price:parseInt(price), date:new Date().toLocaleDateString(), image }
  debts.push(obj)
  save()
  render()
  notify("تم تسجيل دين","تم إضافة "+item+" من "+person+" بقيمة "+price+" دينار")
}

// ===== عرض الديون =====
function render(){
  let tablesDiv=document.getElementById("tables")
  tablesDiv.innerHTML=""
  let total=0
  let grouped = {}
  debts.forEach(d=>{
    total+=d.price
    if(!grouped[d.person]) grouped[d.person]=[]
    grouped[d.person].push(d)
  })

  for(let person in grouped){
    let rows = ""
    grouped[person].forEach((d,i)=>{
      rows+=`<tr>
        <td>${d.item}</td>
        <td>${d.price}</td>
        <td>${d.date}</td>
        <td>${d.image ? `<img src="${d.image}" class="invoice-img" onclick="viewImage('${d.image}')">` : "-"}</td>
        <td><button class="share" onclick="shareInvoice('${person}','${i}')">مشاركة</button></td>
      </tr>`
    })
    tablesDiv.innerHTML+=`
      <h3>${person}</h3>
      <table>
        <thead>
          <tr>
            <th>المنتج</th>
            <th>السعر</th>
            <th>التاريخ</th>
            <th>فاتورة</th>
            <th>مشاركة</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="total">إجمالي دين ${person}: ${grouped[person].reduce((a,b)=>a+b.price,0)} دينار</div>
    `
  }
  document.getElementById("total").innerText="إجمالي كل الديون: "+total+" دينار"
}

render()

// ===== إشعارات صوتية =====
function notify(title,msg){
  if(Notification.permission==="granted"){
    let notification = new Notification(title,{body:msg, icon:"https://cdn-icons-png.flaticon.com/512/2942/2942182.png"})
    let audio = new Audio("https://www.myinstants.com/media/sounds/notification.mp3")
    audio.play()
  }
}
if("Notification" in window){ Notification.requestPermission() }

// ===== تسجيل صوتي =====
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition
const recognition=new SpeechRecognition()
recognition.lang="ar-SA"
recognition.continuous=false
function startVoice(){ recognition.start() }

recognition.onresult=function(e){
  let text=e.results[0][0].transcript
  alert("تم التعرف على الصوت: "+text)
  processVoice(text)
}

// ===== معالجة النص الصوتي =====
function processVoice(text){
  let regex=/اشتريت\s(.+)\sمن\s(.+)\s(\d+)/i
  let match=text.match(regex)
  if(match){
    let item=match[1]
    let person=match[2]
    let price=parseInt(match[3])
    let obj={person,item,price,date:new Date().toLocaleDateString(),image:null}
    debts.push(obj)
    save()
    render()
    notify("تم تسجيل دين صوتي",person+" "+price+" دينار")
  }
}

// ===== فتح الصورة بالحجم الكامل =====
function viewImage(url){
  let imgWin = window.open(url)
  imgWin.focus()
}

// ===== مشاركة على واتساب =====
function shareInvoice(person,index){
  let d = debts.filter(debt=>debt.person===person)[index]
  let text = `فاتورة: ${d.item} من ${d.person} بتاريخ ${d.date} - السعر: ${d.price} دينار`
  let url = `https://wa.me/?text=${encodeURIComponent(text)}`
  window.open(url)
}
</script>
</body>
</html>
